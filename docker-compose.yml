version: '3.8'
services:
  db:
    # Phase 12A: pgvector/pgvector:pg16 = postgres:16 + pgvector extension pre-installed.
    # Same Postgres 16 internals + on-disk format -- existing pgdata volume reused.
    image: pgvector/pgvector:pg16
    container_name: spendscope_db
    environment:
      POSTGRES_USER: spendscope
      POSTGRES_PASSWORD: spendscope_dev
      POSTGRES_DB: spendscope
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendscope"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
